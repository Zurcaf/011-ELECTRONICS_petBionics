; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Keep default PlatformIO directories for cross-OS compatibility.
default_envs = seeed_xiao_esp32c3

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
test_speed = 115200
monitor_dtr = 0
monitor_rts = 0
lib_deps =
	bogde/HX711 @ ^0.7.5
	h2zero/NimBLE-Arduino @ ^2.3.6
	; SD is native in ESP32 Arduino framework
build_src_filter = +<*> -<diagnostic_main.cpp>

[env:seeed_xiao_esp32c3_diag]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
test_speed = 115200
monitor_dtr = 0
monitor_rts = 0
lib_deps =
	bogde/HX711 @ ^0.7.5
	h2zero/NimBLE-Arduino @ ^2.3.6
	; SD is native in ESP32 Arduino framework
build_src_filter = +<*> -<main.cpp>

; Standalone RPY debug sketch – flashes the orientation estimator debug loop
; (no SD, no BLE, no Unity). Use:
;   pio run -e imu_orientation_debug -t upload
;   pio device monitor -e imu_orientation_debug
[env:imu_orientation_debug]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
upload_flags =
	--before=no_reset
	--after=hard_reset
build_src_filter = +<../test/test_imu_orientation/test_main.cpp>
